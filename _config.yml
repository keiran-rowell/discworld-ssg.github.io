# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Discworld 🐢❄️
email: sbf+discworld@unsw.edu.au
description: >- # this means to ignore newlines until "baseurl:"
  Discworld is a bespoke computational cluster for processing biostructural raw data. Specialities: Cryo-Electron Microscopy, Cryo-Tomography. 
minimal_mistakes_skin: catppuccin_latte 
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Discworld"
  avatar : "/assets/images/kurma.png"
  bio    : "Straight from the turtle's mouth"
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "discworld-docs.github.io"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/unsw-edu-au"

footer:
  links:
    - label: "DOI (please cite)"
      icon: "fa-solid fa-book-open"
      url: "https://doi.org/10.26190/4KQF-M552"
    - label: "UNSW Research Infrastructure"
      icon: "fa-solid fa-building-columns"
      url: "https://www.unsw.edu.au/research/facilities-and-infrastructure"

collections:
  field-guide:
    output: true
    permalink: /:collection/:path/

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: field-guide 
    values:
      layout: single
      author_profile: true
      toc: true
      toc_sticky: true
      sidebar:
        nav: "field-guide-nav"
  


category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
